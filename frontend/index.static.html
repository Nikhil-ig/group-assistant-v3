<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>V3 Moderation Dashboard (Demo) - static backup</title>
    <!-- Tailwind CDN (backup) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-2xl font-semibold mb-4">Moderation Dashboard (Demo)</h1>

        <div id="status" class="mb-4 p-4 bg-white rounded shadow"></div>

        <div class="grid grid-cols-2 gap-4">
            <div class="p-4 bg-white rounded shadow">
                <h2 class="font-semibold mb-2">Login</h2>
                <form id="loginForm" class="space-y-2">
                    <input id="userId" class="w-full border p-2 rounded" placeholder="Telegram user id (number)" />
                    <input id="username" class="w-full border p-2 rounded" placeholder="username" />
                    <input id="firstName" class="w-full border p-2 rounded" placeholder="first name" />
                    <button class="px-3 py-2 bg-blue-600 text-white rounded" type="submit">Login</button>
                </form>
            </div>

            <div class="p-4 bg-white rounded shadow">
                <h2 class="font-semibold mb-2">Actions</h2>
                <div class="space-y-2">
                    <input id="groupId" class="w-full border p-2 rounded" placeholder="group id (number)" />
                    <button id="loadMembers" class="px-3 py-2 bg-green-600 text-white rounded">Load Members</button>
                    <button id="loadBlacklist" class="px-3 py-2 bg-red-600 text-white rounded">Load Blacklist</button>
                </div>
            </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
            <div class="p-4 bg-white rounded shadow">
                <h3 class="font-semibold mb-2">Members</h3>
                <div id="members" class="text-sm"></div>
            </div>
            <div class="p-4 bg-white rounded shadow">
                <h3 class="font-semibold mb-2">Blacklist</h3>
                <div id="blacklist" class="text-sm"></div>
            </div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
