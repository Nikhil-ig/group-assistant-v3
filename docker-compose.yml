version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: telegram-bot-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-telegram_bot}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - telegram-bot-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-bot-app
    restart: always
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # Telegram Configuration
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      
      # MongoDB Configuration
      MONGODB_URL: mongodb://${MONGODB_USER:-admin}:${MONGODB_PASSWORD:-changeme}@mongodb:27017/${MONGODB_DB:-telegram_bot}?authSource=admin
      MONGODB_USER: ${MONGODB_USER:-admin}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-changeme}
      MONGODB_DB: ${MONGODB_DB:-telegram_bot}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      
      # Server Configuration
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: /app/logs/bot.log
      API_PORT: 8000
      API_HOST: 0.0.0.0
      
      # Feature Flags
      ENABLE_BOT: ${ENABLE_BOT:-true}
      ENABLE_API: ${ENABLE_API:-true}
      ENABLE_WEB: ${ENABLE_WEB:-true}
      
      # CORS Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - ./logs:/app/logs
      - ./frontend:/app/frontend
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - telegram-bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: telegram-bot-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - telegram-bot
    networks:
      - telegram-bot-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  telegram-bot-network:
    driver: bridge
